name: Actualització setmanal de dades

on:
  schedule:
    - cron: '0 5 * * 1'   # Cada dilluns a les 05:00 UTC
  workflow_dispatch:        # Permet execució manual des del panel de GitHub

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repositori
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instal·lar dependències
        run: pip install -r scripts/requirements.txt

      - name: Marcar inici d'execució
        run: python3 -c "import sys; sys.path.insert(0,'scripts'); import _common; _common.set_last_run()"

      - name: Fetch IPC (INE)
        run: python3 scripts/fetch_ipc.py
        continue-on-error: true

      - name: Fetch SMI (estàtic)
        run: python3 scripts/fetch_smi.py
        continue-on-error: true

      - name: Fetch EPA (INE)
        run: python3 scripts/fetch_epa.py
        continue-on-error: true

      - name: Fetch EPA comarques (GVA-ARGOS)
        run: python3 scripts/fetch_comarques.py
        continue-on-error: true

      - name: Fetch Cost Laboral (INE-ETCL)
        run: python3 scripts/fetch_cost_laboral.py
        continue-on-error: true

      - name: Fetch Salaris (INE-EES)
        run: python3 scripts/fetch_salaris.py
        continue-on-error: true

      - name: Fetch Demografia (INE)
        run: python3 scripts/fetch_demografia.py
        continue-on-error: true

      - name: Fetch Empreses DIRCE (INE)
        run: python3 scripts/fetch_empreses.py
        continue-on-error: true

      - name: Commit i push si hi ha canvis
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No hi ha canvis en les dades."
          else
            git commit -m "🤖 Actualització automàtica de dades [$(date -u '+%Y-%m-%d')]"
            git push
          fi
